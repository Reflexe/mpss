name: CI All Platforms

on:
  pull_request:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows ${{ matrix.configuration }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: win-vs2026-x64
            configuration: Release
          - os: windows-latest
            preset: win-vs2026-x64
            configuration: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (Windows)
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-archives-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git clone https://github.com/microsoft/vcpkg.git
          Set-Location vcpkg
          git checkout $baseline
          .\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure MPSS
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build MPSS
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}" --config "${{ matrix.configuration }}"

      - name: Run MPSS unit tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/${{ matrix.configuration }}/mpss_tests.exe "--gtest_filter=-*CertificateChainSerialization*"

      - name: Run MPSS E2E tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/${{ matrix.configuration }}/mpss_tests.exe "--gtest_filter=*CertificateChainSerialization*"

  macos:
    name: macOS ${{ matrix.configuration }}
    runs-on: macos-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        include:
          - configuration: Debug
            preset: macos-arm64-debug
          - configuration: Release
            preset: macos-arm64-release

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-archives-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build MPSS
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}"

      - name: Run MPSS unit tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/mpss_tests "--gtest_filter=-*CertificateChainSerialization*"

      - name: Run MPSS E2E tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/mpss_tests "--gtest_filter=*CertificateChainSerialization*"

  android:
    name: Android E2E validation ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (Android)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-android-archives-${{ matrix.configuration }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-android-archives-
            ${{ runner.os }}-vcpkg-archives-

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Get Android tool info
        id: toolinfo
        shell: bash
        run: |
          NDK_ROOT="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT}}"
          if [ -z "$NDK_ROOT" ]; then
            SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
            NDK_ROOT=$(ls -d "$SDK_ROOT/ndk/"* 2>/dev/null | sort -V | tail -1)
          fi
          if [ ! -d "$NDK_ROOT" ]; then
            echo "Android NDK not found" >&2
            exit 1
          fi

          if [ -f "$NDK_ROOT/meta/platforms.json" ]; then
            API_LEVEL=$(python3 -c "import json; print(json.load(open('$NDK_ROOT/meta/platforms.json'))['max'])")
          else
            API_LEVEL=$(ls -d "$NDK_ROOT/platforms/android-"* 2>/dev/null | grep -Eo '[0-9]+$' | sort -n | tail -1)
          fi

          echo "api=$API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "ndk=$NDK_ROOT" >> "$GITHUB_OUTPUT"

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS for x64
        shell: bash
        run: |
          cmake -S . -B build-x64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DMPSS_BUILD_TESTS=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=x86_64 \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-android

      - name: Configure MPSS for arm64
        shell: bash
        run: |
          cmake -S . -B build-arm64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DMPSS_BUILD_TESTS=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android

      - name: Build Android artifacts and E2E test target
        shell: bash
        run: |
          cmake --build build-x64
          cmake --build build-arm64
          cmake --install build-x64 --prefix install-x64
          cmake --install build-arm64 --prefix install-arm64

  ios:
    name: iOS E2E validation ${{ matrix.configuration }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (iOS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-ios-archives-${{ matrix.configuration }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ios-archives-
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS XCFrameworks
        shell: bash
        run: |
          cmake -DBUILD_TYPE="${{ matrix.configuration }}" -P cmake/ios_xcframework.cmake

      - name: Compile iOS tests (includes E2E source)
        shell: bash
        run: |
          cmake -S . -B build-ios-sim-${{ matrix.configuration }} -GXcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-ios-sim \
            -DVCPKG_HOST_TRIPLET=arm64-ios \
            -DMPSS_BUILD_MPSS_CORE_STATIC=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON \
            -DMPSS_BUILD_TESTS=ON
          cmake --build build-ios-sim-${{ matrix.configuration }} --config ${{ matrix.configuration }} --target mpss_tests
