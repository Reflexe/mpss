name: CI All Platforms

on:
  pull_request:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows ${{ matrix.configuration }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: win-vs2026-x64
            configuration: Release
          - os: windows-latest
            preset: win-vs2026-x64
            configuration: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (Windows)
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-archives-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git clone https://github.com/microsoft/vcpkg.git
          Set-Location vcpkg
          git checkout $baseline
          .\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure MPSS
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build MPSS
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}" --config "${{ matrix.configuration }}"

      - name: Run MPSS unit tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/${{ matrix.configuration }}/mpss_tests.exe "--gtest_filter=-*CertificateChainSerialization*"

      - name: Run MPSS E2E tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/${{ matrix.configuration }}/mpss_tests.exe "--gtest_filter=*CertificateChainSerialization*"

  macos:
    name: macOS ${{ matrix.configuration }}
    runs-on: macos-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        include:
          - configuration: Debug
            preset: macos-arm64-debug
          - configuration: Release
            preset: macos-arm64-release

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-archives-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build MPSS
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}"

      - name: Run MPSS unit tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/mpss_tests "--gtest_filter=-*CertificateChainSerialization*"

      - name: Run MPSS E2E tests
        shell: bash
        run: out/build/${{ matrix.preset }}/bin/mpss_tests "--gtest_filter=*CertificateChainSerialization*"

  android:
    name: Android E2E validation ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (Android)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-android-archives-${{ matrix.configuration }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-android-archives-
            ${{ runner.os }}-vcpkg-archives-

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Get Android tool info
        id: toolinfo
        shell: bash
        run: |
          NDK_ROOT="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT}}"
          if [ -z "$NDK_ROOT" ]; then
            SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
            NDK_ROOT=$(ls -d "$SDK_ROOT/ndk/"* 2>/dev/null | sort -V | tail -1)
          fi
          if [ ! -d "$NDK_ROOT" ]; then
            echo "Android NDK not found" >&2
            exit 1
          fi

          if [ -f "$NDK_ROOT/meta/platforms.json" ]; then
            API_LEVEL=$(python3 -c "import json; print(json.load(open('$NDK_ROOT/meta/platforms.json'))['max'])")
          else
            API_LEVEL=$(ls -d "$NDK_ROOT/platforms/android-"* 2>/dev/null | grep -Eo '[0-9]+$' | sort -n | tail -1)
          fi

          EMULATOR_API="$API_LEVEL"
          if [ "$EMULATOR_API" -gt 34 ]; then
            EMULATOR_API=34
          fi

          echo "api=$API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "emulator_api=$EMULATOR_API" >> "$GITHUB_OUTPUT"
          echo "ndk=$NDK_ROOT" >> "$GITHUB_OUTPUT"

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS for x64
        shell: bash
        run: |
          cmake -S . -B build-x64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DMPSS_BUILD_TESTS=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=x86_64 \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-android

      - name: Configure MPSS for arm64
        shell: bash
        run: |
          cmake -S . -B build-arm64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DMPSS_BUILD_TESTS=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android

      - name: Build Android artifacts and E2E test target
        shell: bash
        run: |
          cmake --build build-x64
          cmake --build build-arm64
          cmake --install build-x64 --prefix install-x64
          cmake --install build-arm64 --prefix install-arm64

      - name: Stage Android x64 E2E runtime bundle
        shell: bash
        run: |
          mkdir -p android-e2e-x64
          cp build-x64/bin/mpss_tests android-e2e-x64/
          find build-x64/bin -maxdepth 1 -type f -name '*.so' -exec cp -f {} android-e2e-x64/ \;
          if [ -d install-x64/bin ]; then
            find install-x64/bin -maxdepth 1 -type f -name '*.so' -exec cp -f {} android-e2e-x64/ \;
          fi
          if [ -d install-x64/lib ]; then
            find install-x64/lib -maxdepth 2 -type f -name '*.so' -exec cp -f {} android-e2e-x64/ \;
          fi
          ls -la android-e2e-x64

      - name: Run Android x64 E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ steps.toolinfo.outputs.emulator_api }}
          arch: x86_64
          disable-animations: true
          script: |
            adb devices
            for file in android-e2e-x64/*; do
              adb push "$file" /data/local/tmp/
            done
            adb shell "cd /data/local/tmp && chmod +x mpss_tests && LD_LIBRARY_PATH=/data/local/tmp ./mpss_tests --gtest_filter=*CertificateChainSerialization*"

  ios:
    name: iOS E2E validation ${{ matrix.configuration }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg archives (iOS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-ios-archives-${{ matrix.configuration }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ios-archives-
            ${{ runner.os }}-vcpkg-archives-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS XCFrameworks
        shell: bash
        run: |
          cmake -DBUILD_TYPE="${{ matrix.configuration }}" -P cmake/ios_xcframework.cmake

      - name: Compile iOS tests (includes E2E source)
        shell: bash
        run: |
          cmake -S . -B build-ios-sim-${{ matrix.configuration }} -GXcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-ios \
            -DVCPKG_HOST_TRIPLET=arm64-osx \
            -DMPSS_BUILD_MPSS_CORE_STATIC=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON \
            -DMPSS_BUILD_TESTS=ON
          cmake --build build-ios-sim-${{ matrix.configuration }} --config ${{ matrix.configuration }} --target mpss_tests

      - name: Run iOS simulator E2E tests
        shell: bash
        run: |
          APP_PATH="build-ios-sim-${{ matrix.configuration }}/bin/${{ matrix.configuration }}/mpss_tests.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build-ios-sim-${{ matrix.configuration }} -type d -name mpss_tests.app | head -n 1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "mpss_tests.app not found" >&2
            exit 1
          fi

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "import json; runtimes=json.load(__import__('sys').stdin)['runtimes']; ios=[r for r in runtimes if r.get('isAvailable') and 'iOS' in r.get('name','')]; ios.sort(key=lambda r: r.get('version','')); print(ios[-1]['identifier'])")
          DEVICE_TYPE_ID="com.apple.CoreSimulator.SimDeviceType.iPhone-16"
          SIM_UDID=$(xcrun simctl create "mpss-e2e-${{ matrix.configuration }}" "$DEVICE_TYPE_ID" "$RUNTIME_ID")

          cleanup() {
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          }
          trap cleanup EXIT

          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          APP_CONTAINER=$(xcrun simctl get_app_container "$SIM_UDID" "$BUNDLE_ID")
          xcrun simctl spawn "$SIM_UDID" "$APP_CONTAINER/mpss_tests" "--gtest_filter=*CertificateChainSerialization*"
          xcrun simctl spawn "$SIM_UDID" "$APP_CONTAINER/mpss_tests" "--gtest_filter=AttestationPolicyTest.AutoSelectPrefersManagedDeviceWhenAvailable:AttestationPolicyTest.MdmOnlyAndAppAttestOnlySelectionRules:MockPkiTest.AppleAppAttestIsMarkedAsWeakerAssurance:MockPkiTest.AcceptsAppleAcmeManagedDeviceEvidence:MockPkiTest.RejectsAppleAcmeManagedDeviceEvidenceWithoutCertChain"
