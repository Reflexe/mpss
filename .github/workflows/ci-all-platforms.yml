name: CI All Platforms

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Release
            os: windows-latest
            preset: win-vs2022-x64
            configuration: Release
            run_tests: false
            install_pcsclite: false
          - name: Windows Debug
            os: windows-latest
            preset: win-vs2022-x64
            configuration: Debug
            run_tests: false
            install_pcsclite: false
          - name: Windows YubiKey Release
            os: windows-latest
            preset: win-vs2022-x64-with-yubikey
            configuration: Release
            run_tests: false
            install_pcsclite: false
          - name: Windows YubiKey Debug
            os: windows-latest
            preset: win-vs2022-x64-with-yubikey
            configuration: Debug
            run_tests: false
            install_pcsclite: false
          - name: Windows Shared Release
            os: windows-latest
            preset: win-vs2022-x64-shared
            configuration: Release
            run_tests: false
            install_pcsclite: false
          - name: Windows Shared Debug
            os: windows-latest
            preset: win-vs2022-x64-shared
            configuration: Debug
            run_tests: false
            install_pcsclite: false
          - name: Windows YubiKey Shared Release
            os: windows-latest
            preset: win-vs2022-x64-with-yubikey-shared
            configuration: Release
            run_tests: false
            install_pcsclite: false
          - name: Windows YubiKey Shared Debug
            os: windows-latest
            preset: win-vs2022-x64-with-yubikey-shared
            configuration: Debug
            run_tests: false
            install_pcsclite: false
          - name: macOS Release
            os: macos-latest
            preset: macos-x64-release
            configuration: Release
            run_tests: true
            install_pcsclite: false
          - name: macOS Debug
            os: macos-latest
            preset: macos-x64-debug
            configuration: Debug
            run_tests: true
            install_pcsclite: false
          - name: macOS YubiKey Release
            os: macos-latest
            preset: macos-x64-with-yubikey-release
            configuration: Release
            run_tests: false
            install_pcsclite: false
          - name: macOS YubiKey Debug
            os: macos-latest
            preset: macos-x64-with-yubikey-debug
            configuration: Debug
            run_tests: false
            install_pcsclite: false
          - name: Linux YubiKey Release
            os: ubuntu-latest
            preset: linux-with-yubikey-release
            configuration: Release
            run_tests: false
            install_pcsclite: true
          - name: Linux YubiKey Debug
            os: ubuntu-latest
            preset: linux-with-yubikey-debug
            configuration: Debug
            run_tests: false
            install_pcsclite: true

    steps:
      - uses: actions/checkout@v4

      - name: Install pcsclite (Linux)
        if: matrix.install_pcsclite
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git clone https://github.com/microsoft/vcpkg.git
          Set-Location vcpkg
          git checkout $baseline
          .\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build MPSS (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}" --config "${{ matrix.configuration }}"

      - name: Build MPSS (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}"

      - name: Run MPSS unit tests
        if: matrix.run_tests
        shell: bash
        run: "out/build/${{ matrix.preset }}/bin/mpss_tests"

  android:
    name: Android ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Get Android tool info
        id: toolinfo
        shell: bash
        run: |
          NDK_ROOT="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT}}"
          if [ -z "$NDK_ROOT" ]; then
            SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
            NDK_ROOT=$(ls -d "$SDK_ROOT/ndk/"* 2>/dev/null | sort -V | tail -1)
          fi
          if [ ! -d "$NDK_ROOT" ]; then
            echo "Android NDK not found" >&2
            exit 1
          fi

          if [ -f "$NDK_ROOT/meta/platforms.json" ]; then
            API_LEVEL=$(python3 -c "import json; print(json.load(open('$NDK_ROOT/meta/platforms.json'))['max'])")
          else
            API_LEVEL=$(ls -d "$NDK_ROOT/platforms/android-"* 2>/dev/null | grep -Eo '[0-9]+$' | sort -n | tail -1)
          fi

          echo "api=$API_LEVEL" >> "$GITHUB_OUTPUT"
          echo "ndk=$NDK_ROOT" >> "$GITHUB_OUTPUT"

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Configure MPSS for x64
        shell: bash
        run: |
          cmake -S . -B build-x64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=x86_64 \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-android

      - name: Configure MPSS for arm64
        shell: bash
        run: |
          cmake -S . -B build-arm64 -GNinja \
            -DCMAKE_BUILD_TYPE="${{ matrix.configuration }}" \
            -DMPSS_BUILD_MPSS_CORE_SHARED=ON \
            -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION="${{ steps.toolinfo.outputs.api }}" \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK="${{ steps.toolinfo.outputs.ndk }}" \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android

      - name: Build and install Android artifacts
        shell: bash
        run: |
          cmake --build build-x64
          cmake --build build-arm64
          cmake --install build-x64 --prefix install-x64
          cmake --install build-arm64 --prefix install-arm64

  ios:
    name: iOS ${{ matrix.configuration }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout "$BASELINE"
          ./bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=${GITHUB_WORKSPACE}/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS XCFrameworks
        shell: bash
        run: |
          cmake -DBUILD_TYPE="${{ matrix.configuration }}" -P cmake/ios_xcframework.cmake
