name: Attestation Capability Probe

# Throwaway diagnostic: prints the REAL attestation-relevant capabilities of the
# hosted runners so the design doc is grounded in measured facts, not assumptions.
# Safe to delete after results are captured.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/attestation-capability-probe.yml'
      - 'ci-probe/**'

permissions:
  contents: read

jobs:
  windows-probe:
    name: Windows TPM + VBS capability
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: TPM + VBS status
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== Get-Tpm ==="
          try { Get-Tpm | Format-List TpmPresent, TpmReady, TpmEnabled, ManufacturerIdTxt } catch { Write-Host "Get-Tpm failed: $($_.Exception.Message)" }
          Write-Host "=== DeviceGuard / VBS ==="
          try { Get-CimInstance -Namespace 'root\Microsoft\Windows\DeviceGuard' -ClassName Win32_DeviceGuard | Format-List VirtualizationBasedSecurityStatus, SecurityServicesConfigured, SecurityServicesRunning, AvailableSecurityProperties } catch { Write-Host "DeviceGuard query failed: $($_.Exception.Message)" }
          Write-Host "=== KSPs ==="
          (certutil -csplist) -match 'Platform Crypto|Passport|Pluton'

      - name: TPM key + NCryptCreateClaim probe
        continue-on-error: true
        shell: pwsh
        run: |
          $name = "mpss_ci_probe_" + [guid]::NewGuid().ToString("N")
          try {
            $prov = [System.Security.Cryptography.CngProvider]::new("Microsoft Platform Crypto Provider")
            $p = [System.Security.Cryptography.CngKeyCreationParameters]::new()
            $p.Provider = $prov
            $k = [System.Security.Cryptography.CngKey]::Create([System.Security.Cryptography.CngAlgorithm]::ECDsaP256, $name, $p)
            Write-Host "TPM_KEY_CREATE=SUCCESS UniqueName=$($k.UniqueName)"
            $k.Delete()
          } catch {
            Write-Host "TPM_KEY_CREATE=FAILED $($_.Exception.GetType().Name): $($_.Exception.Message)"
          }
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "call `"$vcvars`" && cl /nologo /EHsc ci-probe\claim_probe.cpp /Fe:claim_probe.exe && claim_probe.exe"

      - name: VBS key + VBS claim probe
        continue-on-error: true
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "call `"$vcvars`" && cl /nologo /EHsc ci-probe\vbs_probe.cpp /Fe:vbs_probe.exe && vbs_probe.exe"

      - name: VBS root public key (global vs per-machine test)
        continue-on-error: true
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "call `"$vcvars`" && cl /nologo /EHsc ci-probe\vbs_root_probe.cpp /Fe:vbs_root_probe.exe && vbs_root_probe.exe"

      - name: VBS full generate -> verify E2E (on the hosted runner)
        continue-on-error: true
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvars = Join-Path $vs 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "call `"$vcvars`" && cl /nologo /EHsc ci-probe\vbs_verify_probe.cpp /Fe:vbs_verify_probe.exe && vbs_verify_probe.exe"

  macos-probe:
    name: macOS + iOS-Simulator capability
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Hardware and MDM enrollment
        run: |
          echo "=== Hardware ==="
          system_profiler SPHardwareDataType | grep -Ei 'chip|model name|processor' || true
          echo "=== iBridge / SEP ==="
          system_profiler SPiBridgeDataType 2>&1 | head -n 20 || true
          echo "=== MDM enrollment ==="
          profiles status -type enrollment 2>&1 || true
          sudo profiles status -type enrollment 2>&1 || true

      - name: macOS native probe (DCAppAttestService + Secure Enclave)
        run: |
          swiftc -O -framework DeviceCheck -framework Security ci-probe/se_probe.swift -o se_probe_macos
          ./se_probe_macos || true

      - name: iOS Simulator probe (DCAppAttestService + Secure Enclave)
        run: |
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          swiftc -O -sdk "$SDK" -target arm64-apple-ios16.0-simulator \
            -framework DeviceCheck -framework Security ci-probe/se_probe.swift -o se_probe_ios
          RT=$(xcrun simctl list runtimes available -j | python3 -c "import json,sys; r=[x for x in json.load(sys.stdin)['runtimes'] if x.get('isAvailable') and 'iOS' in x.get('name','')]; r.sort(key=lambda z: z.get('version','')); print(r[-1]['identifier'])")
          echo "runtime=$RT"
          UDID=$(xcrun simctl create mpss-probe "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RT")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "=== iOS Simulator probe output ==="
          xcrun simctl spawn "$UDID" "$PWD/se_probe_ios" || true
          xcrun simctl delete "$UDID" || true

      - name: macOS enrollment + device-attestation capability
        continue-on-error: true
        run: |
          chmod +x ci-probe/macos_enroll_probe.sh
          ./ci-probe/macos_enroll_probe.sh
