name: Dependency Review

# Flags known-vulnerable dependencies introduced in a pull request (compares the
# PR head against its base). Public repo, so this runs without Advanced Security.
on: pull_request

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
