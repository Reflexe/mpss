name: CI

# Regression pipeline: builds mpss + mpss-openssl across the ADO and GitHub
# coverage union. Desktop, Android emulator, and iOS simulator jobs run tests;
# Linux and mobile packaging jobs cover build-only axes.
on:
  pull_request:
  push:
    branches: [main, ado]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Windows + macOS: configure, build, and RUN the full test suite.
  # Tests self-skip (GTEST_SKIP) when no hardware backend is available, so a
  # backend-less runner still exercises every non-hardware code path and, on
  # Windows, the real CNG backend.
  # -------------------------------------------------------------------------
  desktop:
    name: ${{ matrix.name }} ${{ matrix.configuration }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Windows,          os: windows-2022,  preset: win-vs2022-x64,        configuration: Debug,   bindir: "Debug/" }
          - { name: Windows,          os: windows-2022,  preset: win-vs2022-x64,        configuration: Release, bindir: "Release/" }
          - { name: Windows (shared), os: windows-2022,  preset: win-vs2022-x64-shared, configuration: Debug,   bindir: "Debug/" }
          - { name: Windows (shared), os: windows-2022,  preset: win-vs2022-x64-shared, configuration: Release, bindir: "Release/" }
          - { name: macOS,            os: macos-15,      preset: macos-arm64-debug,     configuration: Debug,   bindir: "" }
          - { name: macOS,            os: macos-15,      preset: macos-arm64-release,   configuration: Release, bindir: "" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.os == 'Windows' && '~/AppData/Local/vcpkg/archives' || '~/.cache/vcpkg/archives' }}
          key: ${{ matrix.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.preset }}-${{ env.ImageVersion }}
          restore-keys: |
            ${{ matrix.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ${{ matrix.os }}-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Configure
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake --build "out/build/${{ matrix.preset }}" --config "${{ matrix.configuration }}"
          else
            cmake --build "out/build/${{ matrix.preset }}"
          fi

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          BIN="out/build/${{ matrix.preset }}/bin/${{ matrix.bindir }}mpss_tests"
          [ "$RUNNER_OS" = "Windows" ] && BIN="${BIN}.exe"
          if [ ! -f "$BIN" ]; then
            echo "Test binary not found at $BIN" >&2
            find "out/build/${{ matrix.preset }}/bin" -maxdepth 2 -name 'mpss_tests*' || true
            exit 1
          fi
          "$BIN"

  # -------------------------------------------------------------------------
  # Linux (GCC): mpss has no native Linux backend, so we build with the YubiKey
  # backend enabled. This is our GCC / libstdc++ portability guard. Build only:
  # without a physical YubiKey the tests cannot run meaningfully.
  # -------------------------------------------------------------------------
  linux:
    name: Linux ${{ matrix.configuration }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: linux-with-yubikey-debug,   configuration: Debug }
          - { preset: linux-with-yubikey-release, configuration: Release }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pcsclite (YubiKey dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/vcpkg/archives
          key: linux-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.preset }}-${{ env.ImageVersion }}
          restore-keys: |
            linux-vcpkg-${{ hashFiles('vcpkg.json') }}-
            linux-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Configure
        shell: bash
        run: cmake -S . --preset "${{ matrix.preset }}"

      - name: Build
        shell: bash
        run: cmake --build "out/build/${{ matrix.preset }}"

  # -------------------------------------------------------------------------
  # Android build-only: mirrors the ADO Android pipeline and cross-compiles the
  # shipped shared libraries for both supported ABIs.
  # -------------------------------------------------------------------------
  android-build:
    name: Android build ${{ matrix.configuration }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { configuration: Debug,   x64: android-x64-debug,   arm64: android-arm64-debug }
          - { configuration: Release, x64: android-x64-release, arm64: android-arm64-release }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare Android SDK (NDK 29.0.14206865 + platform 36)
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          [ -n "$SDK_ROOT" ] || { echo "Android SDK not found" >&2; exit 1; }
          [ -n "${ANDROID_HOME:-}" ] || echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          SDKMGR="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          [ -d "$SDK_ROOT/ndk/29.0.14206865" ] || yes | "$SDKMGR" --sdk_root="$SDK_ROOT" "ndk;29.0.14206865" > /dev/null
          [ -f "$SDK_ROOT/platforms/android-36/android.jar" ] || yes | "$SDKMGR" --sdk_root="$SDK_ROOT" "platforms;android-36" > /dev/null
          set -o pipefail

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/vcpkg/archives
          key: android-build-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.configuration }}-${{ env.ImageVersion }}
          restore-keys: |
            android-build-vcpkg-${{ hashFiles('vcpkg.json') }}-
            android-build-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Configure and build (x86_64)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . --preset "${{ matrix.x64 }}"
          cmake --build "out/build/${{ matrix.x64 }}"

      - name: Configure and build (arm64-v8a)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . --preset "${{ matrix.arm64 }}"
          cmake --build "out/build/${{ matrix.arm64 }}"

  # -------------------------------------------------------------------------
  # Android emulator: builds ADO's instrumentation APK from tests/android and
  # runs its native gtest suite through TestRunner on an x86_64 emulator.
  # -------------------------------------------------------------------------
  android-emulator:
    name: Android emulator ${{ matrix.configuration }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { configuration: Debug,   preset: android-x64-debug }
          - { configuration: Release, preset: android-x64-release }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prepare Android SDK (NDK 29.0.14206865 + platforms 34/36)
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          [ -n "$SDK_ROOT" ] || { echo "Android SDK not found" >&2; exit 1; }
          [ -n "${ANDROID_HOME:-}" ] || echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          SDKMGR="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          [ -d "$SDK_ROOT/ndk/29.0.14206865" ] || yes | "$SDKMGR" --sdk_root="$SDK_ROOT" "ndk;29.0.14206865" > /dev/null
          [ -f "$SDK_ROOT/platforms/android-36/android.jar" ] || yes | "$SDKMGR" --sdk_root="$SDK_ROOT" "platforms;android-36" > /dev/null
          [ -f "$SDK_ROOT/platforms/android-34/android.jar" ] || yes | "$SDKMGR" --sdk_root="$SDK_ROOT" "platforms;android-34" > /dev/null
          set -o pipefail

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/vcpkg/archives
          key: android-emulator-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.configuration }}-${{ env.ImageVersion }}
          restore-keys: |
            android-emulator-vcpkg-${{ hashFiles('vcpkg.json') }}-
            android-emulator-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: bash .github/scripts/run-android-instrumentation.sh "${{ matrix.preset }}"

  # -------------------------------------------------------------------------
  # iOS XCFramework: mirrors the ADO iOS pipeline.
  # -------------------------------------------------------------------------
  ios-xcframework:
    name: iOS XCFramework ${{ matrix.configuration }}
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/vcpkg/archives
          key: ios-xcframework-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.configuration }}-${{ env.ImageVersion }}
          restore-keys: |
            ios-xcframework-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ios-xcframework-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Build iOS XCFrameworks
        shell: bash
        run: cmake -DBUILD_TYPE="${{ matrix.configuration }}" -P cmake/ios_xcframework.cmake

  # -------------------------------------------------------------------------
  # iOS simulator: builds the plain gtest app and runs it with simctl spawn on an
  # x86_64 simulator to avoid unsigned XCTest keychain-access-group entitlements.
  # -------------------------------------------------------------------------
  ios-simulator:
    name: iOS simulator ${{ matrix.configuration }}
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    env:
      BUNDLE_ID: com.microsoft.mpss.tests
      BUILD_DIR: out/build/ios-sim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve runner image version (cache key)
        shell: bash
        run: echo "ImageVersion=${ImageVersion:-unknown}" >> "$GITHUB_ENV"

      - name: Cache vcpkg archives
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/vcpkg/archives
          key: ios-simulator-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ matrix.configuration }}-${{ env.ImageVersion }}
          restore-keys: |
            ios-simulator-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ios-simulator-vcpkg-

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Configure gtest app (iphonesimulator, x86_64)
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B "$BUILD_DIR" -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.3 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-ios \
            -DVCPKG_HOST_TRIPLET=arm64-osx \
            -DMPSS_BUILD_MPSS_CORE_STATIC=YES \
            -DMPSS_BUILD_MPSS_OPENSSL_STATIC=YES \
            -DMPSS_BUILD_TESTS=YES \
            -DMPSS_BACKEND_YUBIKEY=NO \
            -DCMAKE_MACOSX_BUNDLE=YES \
            -DMACOSX_BUNDLE_GUI_IDENTIFIER="$BUNDLE_ID"

      - name: Build mpss_tests app
        shell: bash
        run: cmake --build "$BUILD_DIR" --config "${{ matrix.configuration }}" --target mpss_tests

      - name: Locate app bundle
        id: app
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find "$BUILD_DIR" -name 'mpss_tests.app' -type d | head -n 1 || true)
          if [ -z "$APP" ]; then
            echo "mpss_tests.app not found under $BUILD_DIR" >&2
            find "$BUILD_DIR" -name 'mpss_tests*' || true
            exit 1
          fi
          echo "Found app: $APP"
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Info.plist" >/dev/null 2>&1 \
               || [ -z "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist" 2>/dev/null)" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" "$APP/Info.plist" \
              || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $BUNDLE_ID" "$APP/Info.plist"
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Boot iOS simulator
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          RT=$(xcrun simctl list runtimes available -j | python3 -c "import json,sys; r=[x for x in json.load(sys.stdin)['runtimes'] if x.get('isAvailable') and 'iOS' in x.get('name','')]; r.sort(key=lambda z: z.get('version','')); print(r[-1]['identifier'] if r else '')" || true)
          if [ -z "$RT" ]; then echo "No available iOS simulator runtime" >&2; xcrun simctl list runtimes >&2; exit 1; fi
          DT=$(xcrun simctl list devicetypes -j | python3 -c "import json,sys; d=[x['identifier'] for x in json.load(sys.stdin)['devicetypes'] if 'iPhone' in x.get('name','')]; p='com.apple.CoreSimulator.SimDeviceType.iPhone-16'; print(p if p in d else (d[-1] if d else ''))" || true)
          if [ -z "$DT" ]; then echo "No iPhone device type available" >&2; exit 1; fi
          echo "Runtime:     $RT"
          echo "Device type: $DT"
          UDID=$(xcrun simctl create mpss-ios-sim "$DT" "$RT")
          echo "UDID: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run gtest app on simulator
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.sim.outputs.udid }}"
          APP="${{ steps.app.outputs.app }}"
          xcrun simctl install "$UDID" "$APP"
          CONTAINER=$(xcrun simctl get_app_container "$UDID" "$BUNDLE_ID" app)
          BIN="$CONTAINER/mpss_tests"

          TO=""
          for c in timeout gtimeout; do
            if command -v "$c" >/dev/null 2>&1; then TO="$c 600"; break; fi
          done

          dump_sim_diagnostics() {
            echo "::group::CoreSimulator log (tail)"
            tail -n 80 "$HOME/Library/Logs/CoreSimulator/CoreSimulator.log" 2>/dev/null || true
            echo "::endgroup::"
          }

          run_on_sim() {
            local filter="$1" log="$2"
            $TO xcrun simctl spawn "$UDID" "$BIN" --gtest_filter="$filter" 2>&1 | tee "$log" || true
          }

          check_log() {
            local label="$1" log="$2"
            if grep -q '\[  FAILED  \]' "$log"; then
              echo "::error::[$label] gtest reported failing tests"; return 1
            fi
            if ! grep -q '\[  PASSED  \]' "$log"; then
              echo "::error::[$label] no gtest PASSED summary (crash or timeout)"; return 1
            fi
            local passed
            passed=$(grep -oE '\[  PASSED  \] [0-9]+ test' "$log" | grep -oE '[0-9]+' | head -n1 || echo 0)
            if [ "${passed:-0}" -lt 1 ]; then
              echo "::error::[$label] 0 tests passed -- Apple backend produced no usable keys (all skipped)"; return 1
            fi
            echo "[$label] OK ($passed passed)"
          }

          run_gtest() {
            local label="$1" filter="$2"
            local log="gtest-${label}.log"
            echo "::group::gtest ($label)"
            set +e
            run_on_sim "$filter" "$log"
            set -e
            echo "::endgroup::"
            if ! check_log "$label" "$log"; then
              dump_sim_diagnostics
              return 1
            fi
          }

          run_gtest smoke '*CertificateChainSerialization*'
          run_gtest full '*'

      - name: Shut down simulator
        if: always()
        shell: bash
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          if [ -n "${UDID:-}" ]; then
            xcrun simctl shutdown "$UDID" || true
            xcrun simctl delete "$UDID" || true
          fi
