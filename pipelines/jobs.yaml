# This file selects the correct job definition based on system and buildType.

parameters:
  debug: 'false'
  yubikey: 'false'
  linkage: 'static'

jobs:

- ${{ if eq(parameters.name, 'Windows') }}:
  - ${{ if and(eq(parameters.yubikey, 'true'), eq(parameters.linkage, 'shared')) }}:
    - job: ${{ parameters.name }}_YubiKey_Shared
      displayName: "${{ parameters.name }} (YubiKey, Shared)"
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          preset: 'win-vs2022-x64-with-yubikey-shared'
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'
  - ${{ if and(eq(parameters.yubikey, 'true'), ne(parameters.linkage, 'shared')) }}:
    - job: ${{ parameters.name }}_YubiKey
      displayName: "${{ parameters.name }} (YubiKey)"
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          preset: 'win-vs2022-x64-with-yubikey'
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'
  - ${{ if and(ne(parameters.yubikey, 'true'), eq(parameters.linkage, 'shared')) }}:
    - job: ${{ parameters.name }}_Shared
      displayName: "${{ parameters.name }} (Shared)"
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          preset: 'win-vs2022-x64-shared'
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'
  - ${{ if and(ne(parameters.yubikey, 'true'), ne(parameters.linkage, 'shared')) }}:
    - job: ${{ parameters.name }}
      displayName: ${{ parameters.name }}
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          preset: 'win-vs2022-x64'
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'

- ${{ if and(eq(parameters.name, 'Linux'), eq(parameters.yubikey, 'true')) }}:
  - job: ${{ parameters.name }}_YubiKey
    displayName: ${{ parameters.name }} (YubiKey)
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - template: nix.yaml
      parameters:
        yubikey: 'true'
        ${{ if eq(parameters.debug, 'true') }}:
          preset: 'linux-with-yubikey-debug'
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          preset: 'linux-with-yubikey-release'
          configuration: 'Release'

- ${{ if eq(parameters.name, 'macOS') }}:
  - ${{ if eq(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}_YubiKey
      displayName: "${{ parameters.name }} (YubiKey)"
      pool:
        vmImage: 'macos-latest'
      steps:
      - template: nix.yaml
        parameters:
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            preset: 'macos-x64-with-yubikey-debug'
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            preset: 'macos-x64-with-yubikey-release'
            configuration: 'Release'
  - ${{ if ne(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}
      displayName: ${{ parameters.name }}
      pool:
        vmImage: 'macos-latest'
      steps:
      - template: nix.yaml
        parameters:
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            preset: 'macos-x64-debug'
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            preset: 'macos-x64-release'
            configuration: 'Release'

- ${{ if eq(parameters.name, 'Android') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    timeoutInMinutes: 180
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - template: android.yaml
      parameters:
        ${{ if eq(parameters.debug, 'true') }}:
          x64Preset: 'android-x64-debug'
          arm64Preset: 'android-arm64-debug'
        ${{ if eq(parameters.debug, 'false') }}:
          x64Preset: 'android-x64-release'
          arm64Preset: 'android-arm64-release'

- ${{ if eq(parameters.name, 'iOS') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    pool:
      vmImage: 'macos-latest'
    steps:
    - template: ios.yaml
      parameters:
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'
