parameters:
  configuration: 'Release'

steps:
- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $BASELINE
      ./bootstrap-vcpkg.sh -disableMetrics
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- task: CmdLine@2
  displayName: 'Build iOS XCFrameworks'
  inputs:
    script: |
      export VCPKG_ROOT=$(Build.SourcesDirectory)/vcpkg
      cmake \
        -DBUILD_TYPE=${{ parameters.configuration }} \
        -P cmake/ios_xcframework.cmake
    workingDirectory: '$(Build.SourcesDirectory)'
