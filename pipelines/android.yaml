parameters:
  configuration: 'Release'

steps:
- task: CmdLine@2
  displayName: 'Install JDK 21'
  inputs:
    script: |
      sudo apt-get update
      sudo apt-get install -y openjdk-21-jdk
      JAVA_HOME=$(readlink -f "$(command -v javac)" | sed 's:/bin/javac::')
      echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME"

- task: CmdLine@2
  displayName: 'Get tool info'
  name: GetToolInfo
  inputs:
    script: |
      # Find the highest supported Android API level from the NDK.
      NDK_ROOT="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT}}"
      if [ -z "$NDK_ROOT" ]; then
        SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
        NDK_ROOT=$(ls -d "$SDK_ROOT/ndk/"* 2>/dev/null | sort -V | tail -1)
      fi
      if [ ! -d "$NDK_ROOT" ]; then
        echo "##[error]Android NDK not found."
        exit 1
      fi

      if [ -f "$NDK_ROOT/meta/platforms.json" ]; then
        API_LEVEL=$(python3 -c "import json; print(json.load(open('$NDK_ROOT/meta/platforms.json'))['max'])")
      else
        API_LEVEL=$(ls -d "$NDK_ROOT/platforms/android-"* 2>/dev/null | grep -Eo '[0-9]+$' | sort -n | tail -1)
      fi
      echo "Highest API level: $API_LEVEL"
      echo "##vso[task.setvariable variable=MPSSAndroidAPILevel;isOutput=true]$API_LEVEL"

      echo "NDK: $NDK_ROOT"
      echo "##vso[task.setvariable variable=AndroidNdkHome;isOutput=true]$NDK_ROOT"

- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $BASELINE
      ./bootstrap-vcpkg.sh -disableMetrics
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- task: CMake@1
  displayName: 'Configure MPSS for x64'
  inputs:
    cmakeArgs: >
        -S .
        -B build-x64
        -GNinja
        -DCMAKE_BUILD_TYPE=${{ parameters.configuration }}
        -DMPSS_BUILD_MPSS_CORE_SHARED=ON
        -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON
        -DCMAKE_SYSTEM_NAME=Android
        -DCMAKE_SYSTEM_VERSION=$(GetToolInfo.MPSSAndroidAPILevel)
        -DCMAKE_ANDROID_ARCH_ABI=x86_64
        -DCMAKE_ANDROID_NDK=$(GetToolInfo.AndroidNdkHome)
        -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DVCPKG_TARGET_TRIPLET=x64-android
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Configure MPSS for ARM64'
  inputs:
    cmakeArgs: >
        -S .
        -B build-arm64
        -GNinja
        -DCMAKE_BUILD_TYPE=${{ parameters.configuration }}
        -DMPSS_BUILD_MPSS_CORE_SHARED=ON
        -DMPSS_BUILD_MPSS_OPENSSL_SHARED=ON
        -DCMAKE_SYSTEM_NAME=Android
        -DCMAKE_SYSTEM_VERSION=$(GetToolInfo.MPSSAndroidAPILevel)
        -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a
        -DCMAKE_ANDROID_NDK=$(GetToolInfo.AndroidNdkHome)
        -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DVCPKG_TARGET_TRIPLET=arm64-android
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS for x64'
  inputs:
    cmakeArgs: --build build-x64
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS for Arm64'
  inputs:
    cmakeArgs: --build build-arm64
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Install MPSS for x64'
  inputs:
    cmakeArgs: --install build-x64 --prefix install-x64
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Install MPSS for Arm64'
  inputs:
    cmakeArgs: --install build-arm64 --prefix install-arm64
    workingDirectory: '$(Build.SourcesDirectory)'
