parameters:
  x64Preset: 'android-x64-release'
  arm64Preset: 'android-arm64-release'

steps:
- task: JavaToolInstaller@0
  displayName: 'Install JDK 21'
  inputs:
    versionSpec: '21'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'

- task: CmdLine@2
  displayName: 'Prepare Android SDK'
  inputs:
    script: |
      COMPILE_API_LEVEL=36
      NDK_VERSION=29.0.14206865
      SDK_ROOT="$ANDROID_HOME"
      NDK_ROOT="$SDK_ROOT/ndk/$NDK_VERSION"
      SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
      if [ -z "$SDK_ROOT" ]; then
        echo "##[error]Android SDK not found."
        exit 1
      fi

      if [ ! -f "$SDK_ROOT/platforms/android-$COMPILE_API_LEVEL/android.jar" ] ||
         [ ! -d "$NDK_ROOT" ]; then
        if [ ! -x "$SDKMANAGER" ]; then
          echo "##[error]Required Android SDK packages are missing and sdkmanager is unavailable."
          exit 1
        fi
      fi

      if [ ! -f "$SDK_ROOT/platforms/android-$COMPILE_API_LEVEL/android.jar" ]; then
        yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" "platforms;android-$COMPILE_API_LEVEL"
      fi
      if [ ! -d "$NDK_ROOT" ]; then
        yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" "ndk;$NDK_VERSION"
      fi

      echo "Compile API level: $COMPILE_API_LEVEL"
      echo "NDK: $NDK_ROOT"

- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $BASELINE
      ./bootstrap-vcpkg.sh -disableMetrics
      echo "##vso[task.setvariable variable=VCPKG_ROOT]$(Build.SourcesDirectory)/vcpkg"
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- task: CMake@1
  displayName: 'Configure MPSS (${{ parameters.x64Preset }})'
  inputs:
    cmakeArgs: --preset ${{ parameters.x64Preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Configure MPSS (${{ parameters.arm64Preset }})'
  inputs:
    cmakeArgs: --preset ${{ parameters.arm64Preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS for x64'
  inputs:
    cmakeArgs: --build --preset ${{ parameters.x64Preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS for Arm64'
  inputs:
    cmakeArgs: --build --preset ${{ parameters.arm64Preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Install MPSS for x64'
  inputs:
    cmakeArgs: --install out/build/${{ parameters.x64Preset }} --prefix install-x64
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Install MPSS for Arm64'
  inputs:
    cmakeArgs: --install out/build/${{ parameters.arm64Preset }} --prefix install-arm64
    workingDirectory: '$(Build.SourcesDirectory)'
