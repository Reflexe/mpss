parameters:
  configuration: 'Release'
  preset: 'win-vs2022-x64'

steps:
- ${{ if eq(parameters.configuration, 'Release') }}:
  - task: CredScan@3
    displayName: 'Credential Scan'

  - task: CodeQL3000Init@0

  - task: ComponentGovernanceComponentDetection@0
    inputs:
      scanType: 'Register'
      verbosity: 'Verbose'
      alertWarningLevel: 'High'

- task: Powershell@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    targetType: 'inline'
    script: |
      $baseline = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $baseline
      .\bootstrap-vcpkg.bat -disableMetrics
      Write-Host "##vso[task.setvariable variable=VCPKG_ROOT]$(Build.SourcesDirectory)\vcpkg"
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Configure MPSS (${{ parameters.preset }})'
  inputs:
    cmakeArgs: --preset ${{ parameters.preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS'
  inputs:
    cmakeArgs: >
      --build out/build/${{ parameters.preset }}
      --config ${{ parameters.configuration }}
    workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if eq(parameters.configuration, 'Release') }}:
  - task: CodeQL3000Finalize@0

# Unit tests will fail because TPM cannot be accessed in the Azure Pipelines hosted agents.
# - script: '${{ parameters.configuration }}\mpss_tests.exe'
#   workingDirectory: '$(Build.SourcesDirectory)\out\build\${{ parameters.preset }}\bin'
#   displayName: 'Run unit tests'

- task: PublishSecurityAnalysisLogs@3
  inputs:
    ArtifactName: 'CodeAnalysisLogs'
    ArtifactType: 'Container'
    PublishProcessedResults: true
    AllTools: true
    ToolLogsNotFoundAction: 'Standard'
