parameters:
  artifactName: ''
  configuration: 'Release'
  yubikey: 'false'

steps:
- ${{ if eq(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Install pcsclite (Linux)'
    condition: eq(variables['Agent.OS'], 'Linux')
    inputs:
      script: |
        if command -v sudo > /dev/null; then
          sudo apt-get update && sudo apt-get install -y libpcsclite-dev
        else
          apt-get update && apt-get install -y libpcsclite-dev
        fi

- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $BASELINE
      ./bootstrap-vcpkg.sh -disableMetrics
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- ${{ if ne(parameters.yubikey, 'true') }}:
  - task: CMake@1
    displayName: 'Configure MPSS'
    inputs:
      cmakeArgs: >
        -S .
        -B build
        -GNinja
        -DCMAKE_BUILD_TYPE=${{ parameters.configuration }}
        -DMPSS_BUILD_MPSS_CORE_STATIC=ON
        -DMPSS_BUILD_TESTS=ON
        -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON
        -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
      workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if eq(parameters.yubikey, 'true') }}:
  - task: CMake@1
    displayName: 'Configure MPSS (YubiKey)'
    inputs:
      cmakeArgs: >
        -S .
        -B build
        -GNinja
        -DCMAKE_BUILD_TYPE=${{ parameters.configuration }}
        -DMPSS_BUILD_MPSS_CORE_STATIC=ON
        -DMPSS_BUILD_TESTS=ON
        -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON
        -DMPSS_BACKEND_YUBIKEY=ON
        -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
      workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS'
  inputs:
    cmakeArgs: >
      --build build
      --config ${{ parameters.configuration }}
    workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if ne(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Run MPSS unit tests'
    inputs:
      script: 'build/bin/mpss_tests'
      workingDirectory: '$(Build.SourcesDirectory)'
