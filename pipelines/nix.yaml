parameters:
  configuration: 'Release'
  preset: ''
  yubikey: 'false'

steps:
- ${{ if eq(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Install pcsclite (Linux)'
    condition: eq(variables['Agent.OS'], 'Linux')
    inputs:
      script: |
        if command -v sudo > /dev/null; then
          sudo apt-get update && sudo apt-get install -y libpcsclite-dev
        else
          apt-get update && apt-get install -y libpcsclite-dev
        fi

- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      BASELINE=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout $BASELINE
      ./bootstrap-vcpkg.sh -disableMetrics
      echo "##vso[task.setvariable variable=VCPKG_ROOT]$(Build.SourcesDirectory)/vcpkg"
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- task: CMake@1
  displayName: 'Configure MPSS (${{ parameters.preset }})'
  inputs:
    cmakeArgs: --preset ${{ parameters.preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS'
  inputs:
    cmakeArgs: --build out/build/${{ parameters.preset }}
    workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if ne(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Run MPSS unit tests'
    inputs:
      script: out/build/${{ parameters.preset }}/bin/mpss_tests
      workingDirectory: '$(Build.SourcesDirectory)'
